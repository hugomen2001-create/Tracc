<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracc — Panel Entrenador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--bg2:#fff;--bg3:#f0efed;
  --border:#e5e4e0;--border2:#d4d3cf;
  --green:#16a34a;--gl:#dcfce7;--gm:#bbf7d0;
  --amber:#d97706;--al:#fef3c7;
  --red:#dc2626;--rl:#fee2e2;
  --blue:#2563eb;--bl:#dbeafe;
  --text:#1a1a18;--text2:#6b6b66;--text3:#a3a39e;
  --sidebar:260px;
  --font:'DM Sans',sans-serif;
  --serif:'DM Serif Display',serif;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── SHELL ── */
.shell{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.logo-icon{width:28px;height:28px;background:#1a1a18;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:13.5px;font-weight:700;letter-spacing:-.3px;color:#1a1a18}
.logo-sub{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.coach-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:#1a1a18;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.coach-name{font-size:12px;font-weight:600;color:var(--text)}
.coach-role{font-size:10px;color:var(--text3)}
.gear-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:7px;padding:4px 7px;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;transition:all .15s}
.gear-btn:hover{color:var(--text);border-color:var(--border2)}

.sb-nav{padding:8px 8px 4px;border-bottom:1px solid var(--border);flex-shrink:0}
.overview-btn{width:100%;font-size:11.5px;font-weight:500;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;color:var(--text2);font-family:var(--font);text-align:left;display:flex;align-items:center;gap:6px;transition:background .12s}
.overview-btn:hover{background:var(--bg3)}
.overview-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}

.sb-clients-hdr{padding:8px 14px 5px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.nuevo-btn{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;color:var(--text2);font-family:var(--font);position:relative;transition:all .12s}
.nuevo-btn:hover{background:var(--bg3)}
.nuevo-badge{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);color:#fff;font-size:8.5px;font-weight:700;display:flex;align-items:center;justify-content:center}

.sb-search-wrap{padding:0 8px 6px;flex-shrink:0}
.sb-search{width:100%;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);font-size:11.5px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:5px}
.sb-search::placeholder{color:var(--text3)}

.client-list{flex:1;overflow-y:auto;padding:2px 6px 6px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.client-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .12s;user-select:none}
.client-item:hover{background:var(--bg3)}
.client-item.active{background:#1a1a18}
.client-item.active .client-name{color:#fff}
.client-item.active .client-meta{color:rgba(255,255,255,.4)}
.client-item.active .c-av{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:1px}
.dg{background:var(--green)}.da{background:var(--amber)}.dr{background:var(--red)}
.c-av{width:26px;height:26px;border-radius:50%;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.client-name{font-size:12px;font-weight:500;flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:10px;color:var(--text3);flex-shrink:0}
.sb-footer{padding:9px 14px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text3);flex-shrink:0}
.sb-footer span{color:var(--text2);font-weight:600}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

/* ── CLIENT HEADER ── */
.client-header{padding:16px 24px 0;position:sticky;top:0;background:var(--bg);z-index:10;flex-shrink:0}
.ch-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:0}
.ch-av{width:42px;height:42px;border-radius:50%;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);flex-shrink:0;background:var(--bg3)}
.ch-info{flex:1;min-width:0}
.ch-name{font-family:var(--serif);font-size:22px;color:var(--text);letter-spacing:-.4px;line-height:1.1}
.ch-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}
.meta-chip{font-size:11px;color:var(--text3)}
.status-pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;border:1px solid transparent}
.pill-g{background:var(--gl);color:var(--green);border-color:var(--gm)}
.pill-a{background:var(--al);color:var(--amber)}
.pill-r{background:var(--rl);color:var(--red)}
.ch-actions{display:flex;gap:6px;flex-shrink:0;padding-top:2px}
.ch-action-btn{height:30px;padding:0 12px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .12s;display:flex;align-items:center;gap:5px}
.ch-action-btn:hover{background:var(--bg3);border-color:var(--border2)}
.ch-action-btn.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.ch-action-btn.primary:hover{opacity:.85}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:0;margin-top:14px;border-bottom:1px solid var(--border)}
.vtab{padding:8px 16px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;white-space:nowrap}
.vtab:hover{color:var(--text2)}
.vtab.active{color:var(--text);border-bottom-color:#1a1a18}

/* ── CONTENT ── */
.content{padding:20px 24px 48px;flex:1}

/* ── ALERT ── */
.alert-bar{background:var(--al);border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--amber)}
.alert-bar.red{background:var(--rl);border-color:#fca5a5;color:var(--red)}
.alert-bar.green{background:var(--gl);border-color:var(--gm);color:var(--green)}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:box-shadow .15s,border-color .15s;box-shadow:var(--shadow)}
.stat-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,.08)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text);font-family:var(--serif)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}
.sg{color:var(--green)}.sa{color:var(--amber)}.sr{color:var(--red)}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width .6s}
.pa{background:var(--amber)}.pr{background:var(--red)}

/* ── WEEK STRIP ── */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
.day-cell{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:8px 4px;text-align:center;box-shadow:var(--shadow)}
.day-cell.trained{background:var(--gl);border-color:var(--gm)}
.day-cell.rest{background:var(--bg3)}
.day-name{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:.04em}
.day-cell.trained .day-name{color:rgba(22,163,74,.6)}
.day-check{font-size:13px;margin-bottom:2px}
.day-session{font-size:10px;font-weight:700}
.day-cell.trained .day-session{color:var(--green)}
.day-cell:not(.trained) .day-session{color:var(--text3)}

/* ── TWO/THREE COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}

/* ── PANEL CARD ── */
.panel-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.panel-title-link{font-size:11px;color:var(--green);font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0}

/* ── METRICS GRID ── */
.metrics-2x2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.metric-tile{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s;box-shadow:var(--shadow)}
.metric-tile:hover{border-color:var(--border2)}
.metric-emoji{font-size:15px;flex-shrink:0}
.metric-val-sm{font-size:15px;font-weight:700;letter-spacing:-.4px;line-height:1;color:var(--text)}
.metric-lbl{font-size:9.5px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* ── WORKOUT ROWS ── */
.workout-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.workout-row:last-child{border-bottom:none}
.ex-num{width:18px;height:18px;border-radius:5px;background:var(--bg3);color:var(--text2);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-name{font-size:12px;font-weight:400;flex:1;color:var(--text)}
.ex-sets{font-size:11px;color:var(--text2);font-weight:600}
.ex-vol{font-size:10px;color:var(--text3);min-width:38px;text-align:right}

/* ── CHEAT ROWS ── */
.cheat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.cheat-row:last-child{border-bottom:none}
.cheat-kcal{color:var(--red);font-size:11px;font-weight:600;white-space:nowrap;margin-left:8px}
.cheat-date{font-size:10px;color:var(--text3);margin-top:2px}

/* ── SECTION TITLE ── */
.section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:8px;color:var(--text3)}
.empty-icon{font-size:32px;opacity:.3;margin-bottom:4px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:12px;line-height:1.5;max-width:280px}

/* ── OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.ov-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.ov-stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.ov-stat-val{font-family:var(--serif);font-size:28px;color:var(--text);letter-spacing:-1px;line-height:1}
.ov-stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.client-overview-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
.client-overview-card:hover{border-color:var(--border2);box-shadow:0 2px 16px rgba(0,0,0,.08)}
.ov-av{width:36px;height:36px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--border);background:var(--bg3)}
.ov-name{font-size:13px;font-weight:600;color:var(--text)}
.ov-meta{font-size:11px;color:var(--text3);margin-top:2px}
.ov-stats{margin-left:auto;text-align:right;flex-shrink:0}
.ov-stat-num{font-size:13px;font-weight:700;color:var(--text)}
.ov-stat-lbl{font-size:10px;color:var(--text3)}

/* ── LOADING ── */
#screen-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.loading-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
.loading-name{font-family:var(--serif);font-size:28px;color:var(--text);letter-spacing:-.5px}
.loading-name span{color:var(--green)}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── AUTH ── */
#screen-auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.1)}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px}
.auth-logo-icon{width:32px;height:32px;background:#1a1a18;border-radius:8px;display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-size:16px;font-weight:700;letter-spacing:-.4px}
.auth-title{font-family:var(--serif);font-size:24px;color:var(--text);letter-spacing:-.3px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.auth-field{margin-bottom:12px}
.auth-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;display:block}
.auth-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;background:var(--bg3);transition:border-color .15s}
.auth-input:focus{border-color:#1a1a18;background:var(--bg2)}
.auth-btn{width:100%;height:40px;border-radius:9px;background:#1a1a18;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-err{background:var(--rl);border:1px solid #fca5a5;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.auth-err.show{display:block}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:2000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.green{background:var(--green)}
#toast.red{background:var(--red)}


/* ── REQUESTS ── */
.req-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow)}
.req-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.req-name{font-family:var(--serif);font-size:18px;color:var(--text);letter-spacing:-.3px}
.req-email{font-size:12px;color:var(--text3);margin-top:2px}
.req-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:var(--al);color:var(--amber);border:1px solid #fde68a;flex-shrink:0}
.req-data-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.req-data-item{background:var(--bg3);border-radius:8px;padding:8px 10px}
.req-data-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.req-data-val{font-size:13px;font-weight:600;color:var(--text)}
.req-q{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.req-q:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.req-q-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.req-q-val{font-size:13px;color:var(--text);line-height:1.5}
.req-actions{display:flex;gap:8px}
.req-btn{flex:1;height:38px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .12s}
.req-btn:hover{background:var(--border)}
.req-btn.accept{background:var(--green);color:#fff;border-color:var(--green)}
.req-btn.accept:hover{opacity:.85}
.req-btn.reject{background:var(--rl);color:var(--red);border-color:#fca5a5}
.req-details-toggle{font-size:11px;color:var(--green);cursor:pointer;font-weight:600;margin-bottom:10px;display:inline-flex;align-items:center;gap:4px}

/* ── HIDDEN ── */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading">
  <div class="loading-inner">
    <div class="loading-name">Tracc<span>.</span></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- AUTH -->
<div id="screen-auth" class="hidden">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M18 4v16"/><rect x="2" y="8" width="4" height="8" rx="1"/><rect x="18" y="8" width="4" height="8" rx="1"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
      </div>
      <div class="auth-logo-text">Tracc</div>
    </div>
    <div class="auth-title">Panel del entrenador</div>
    <div class="auth-sub">Accede con tu cuenta de entrenador.</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-field">
      <label class="auth-label">Email</label>
      <input type="email" class="auth-input" id="auth-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label class="auth-label">Contraseña</label>
      <input type="password" class="auth-input" id="auth-pwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="auth-btn" id="auth-btn" onclick="doLogin()">Entrar</button>
  </div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://zniepgmzwhbxpsztpvli.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuaWVwZ216d2hieHBzenRwdmxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzcxMzksImV4cCI6MjA5NTA1MzEzOX0.fYwxr4D6NYYxwSS-R37NoTEmCf_KkInWoOegSJP-rhk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DEFAULT_PLAN = ['TORSO','DESCANSO','LEG','PUSH','PULL','DESCANSO','DESCANSO'];

// ── HELPERS ──
function showToast(msg, type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2200);
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function getWeekStart(){
  const d=new Date();const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  return new Date(d.setDate(diff)).toISOString().slice(0,10);
}
function fmtDate(str){
  if(!str)return '—';
  const d=new Date(str+'T12:00');
  return d.getDate()+' '+MONTHS_ES[d.getMonth()];
}
function initials(name){
  if(!name)return '?';
  return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function daysSince(str){
  if(!str)return null;
  return Math.floor((new Date()-new Date(str+'T12:00'))/86400000);
}

// ── AUTH ──
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pwd=document.getElementById('auth-pwd').value;
  if(!email||!pwd){showAuthErr('Completa todos los campos');return;}
  const btn=document.getElementById('auth-btn');
  btn.innerHTML='<div class="spinner"></div>';btn.disabled=true;
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    btn.innerHTML='Entrar';btn.disabled=false;
    if(error){showAuthErr('Email o contraseña incorrectos.');return;}
    await initApp(data.user);
  }catch(e){
    btn.innerHTML='Entrar';btn.disabled=false;
    showAuthErr('Error de conexión.');
  }
}
function showAuthErr(msg){
  const el=document.getElementById('auth-err');el.textContent=msg;el.classList.add('show');
}
async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('screen-app').classList.add('hidden');
  document.getElementById('screen-auth').classList.remove('hidden');
  coachData=null;allClients=[];selectedClient=null;
}

// ── INIT ──
async function initApp(user){
  document.getElementById('screen-loading').classList.remove('hidden');
  document.getElementById('screen-auth').classList.add('hidden');
  document.getElementById('screen-app').classList.add('hidden');

  try{
    // Get coach data
    const {data:coach}=await sb.from('coaches').select('*').eq('user_id',user.id).maybeSingle();
    coachData=coach;

    if(!coach){
      // Not a coach — show error
      document.getElementById('screen-loading').classList.add('hidden');
      document.getElementById('screen-auth').classList.remove('hidden');
      showAuthErr('Esta cuenta no tiene acceso al panel de entrenador.');
      await sb.auth.signOut();
      return;
    }

    // Update coach UI
    const name=coach.name||user.email;
    document.getElementById('coach-name').textContent=name.split(' ')[0];
    document.getElementById('coach-avatar').textContent=initials(name);

    // Get clients
    const {data:clients}=await sb.from('clients').select('*').eq('coach_id',coach.id).eq('status','active').order('name');
    allClients=clients||[];
    document.getElementById('client-count').textContent=allClients.length;

    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-app').classList.remove('hidden');

    renderClientList(allClients);
    // Check pending requests count
    const {data:pendingCount}=await sb.from('pending_requests').select('id',{count:'exact'}).eq('coach_id',coach.id).eq('status','pending');
    const cnt=pendingCount?.length||0;
    if(cnt>0){document.getElementById('requests-badge').textContent=cnt;document.getElementById('requests-badge').classList.remove('hidden');}
    showOverview();
  }catch(e){
    console.error(e);
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-auth').classList.remove('hidden');
    showAuthErr('Error al cargar los datos.');
  }
}

// ── CLIENT LIST ──
function renderClientList(clients){
  const el=document.getElementById('client-list');
  if(!clients.length){
    el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">Sin clientes aún</div>';
    return;
  }
  el.innerHTML=clients.map(c=>`
    <div class="client-item${selectedClient?.id===c.id?' active':''}" onclick="selectClient('${c.id}')">
      <div class="cdot dg"></div>
      <div class="c-av">${initials(c.name)}</div>
      <div class="client-name">${c.name}</div>
      <div class="client-meta">${c.goal||'—'}</div>
    </div>
  `).join('');
}

function filterClients(q){
  const filtered=allClients.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  renderClientList(filtered);
}

// ── SELECT CLIENT ──
async function selectClient(id){
  selectedClient=allClients.find(c=>c.id===id);
  if(!selectedClient)return;
  renderClientList(allClients);
  selectedTab='resumen';
  await loadClientView();
}

                <td style="text-align:center;padding:7px 8px;color:${m.sleep_hours>=8?'var(--green)':m.sleep_hours>=7?'var(--amber)':'var(--text)'}">${m.sleep_hours?m.sleep_hours+'h':'—'}</td>
                <td style="text-align:center;padding:7px 8px;color:var(--text2)">${m.activity||'—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`:
      `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Sin datos de progreso</div><div class="empty-sub">${c.name.split(' ')[0]} no ha registrado métricas todavía.</div></div>`}

  }

  main.innerHTML=headerHtml+contentHtml;
  document.getElementById('btn-overview')?.classList.remove('active');
}


// ── ENTRENO TAB ──
const SESSION_TYPES = ['PUSH','PULL','LEG','TORSO','BRAZO','DESCANSO'];
const DAYS_ES = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

async function renderEntrenoTab(c){
  // Load active training plan
  const {data:plan}=await sb.from('training_plans').select('*').eq('client_id',c.id).eq('is_active',true).maybeSingle();
  
  // Load all sessions this week
  const wkStart=getWeekStart();
  const {data:sessions}=await sb.from('workout_sessions').select('*,workout_sets(*)').eq('client_id',c.id).order('session_date',{ascending:false}).limit(30);
  const allSess=sessions||[];
  const wkSess=allSess.filter(s=>s.session_date>=wkStart);
  const completed=wkSess.filter(s=>s.completed);

  // Load plan exercises if plan exists
  let planExercises=[];
  if(plan){
    const {data:exs}=await sb.from('plan_exercises').select('*').eq('training_plan_id',plan.id).order('day_number').order('order_index');
    planExercises=exs||[];
  }

  const splitDays=plan?.split||['TORSO','DESCANSO','LEG','PUSH','PULL','DESCANSO','DESCANSO'];

  return `<div class="content">
    <!-- Plan actual -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">Plan de entreno activo</div>
      <button class="ch-action-btn primary" onclick="showCreatePlanModal('${c.id}')">+ Crear / editar plan</button>
    </div>

    ${plan?`
    <!-- Week split -->
    <div class="week-strip" style="margin-bottom:14px">
      ${splitDays.map((sess,i)=>{
        const dd=getDayDateFromWeekStart(i);
        const session=wkSess.find(s=>s.session_date===dd);
        const done=session?.completed;
        return `<div class="day-cell${done?' trained':sess==='DESCANSO'?' rest':''}">
          <div class="day-name">${DAYS_ES[i].slice(0,3).toUpperCase()}</div>
          <div class="day-check">${done?'✓':sess==='DESCANSO'?'—':'·'}</div>
          <div class="day-session">${sess}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Exercises by day -->
    ${splitDays.map((sess,i)=>{
      if(sess==='DESCANSO')return '';
      const dayExs=planExercises.filter(e=>e.day_number===i+1);
      if(!dayExs.length)return '';
      return `<div class="panel-card" style="margin-bottom:10px">
        <div class="panel-title">${DAYS_ES[i]} — ${sess}
          <span style="font-size:11px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">${dayExs.length} ejercicios</span>
        </div>
        ${dayExs.map((ex,idx)=>`<div class="workout-row">
          <div class="ex-num">${idx+1}</div>
          <div class="ex-name">${ex.exercise_name}</div>
          <div class="ex-sets">${ex.sets}×${ex.reps}</div>
          <div class="ex-vol">${ex.rest||'—'}</div>
        </div>`).join('')}
      </div>`;
    }).join('')}
    `:`<div class="panel-card" style="margin-bottom:14px">
      <div class="empty-state" style="padding:24px">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Sin plan activo</div>
        <div class="empty-sub">Crea el plan de entreno para ${c.name.split(' ')[0]} y lo verá automáticamente en su app.</div>
      </div>
    </div>`}

    <!-- Session history -->
    <div class="section-title">${allSess.filter(s=>s.completed).length} sesiones completadas en total</div>
    ${allSess.filter(s=>s.completed).slice(0,10).map(s=>{
      const sets=s.workout_sets||[];
      const exNames=[...new Set(sets.map(ws=>ws.exercise_name))];
      const totalVol=sets.reduce((a,ws)=>a+((ws.reps_done||0)*(ws.weight_kg||0)),0);
      return `<div class="panel-card" style="margin-bottom:8px">
        <div class="panel-title">${s.session_type}
          <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">${fmtDate(s.session_date)}</span>
          <span style="font-size:11px;color:var(--green);font-weight:600;text-transform:none;letter-spacing:0">${totalVol?Math.round(totalVol).toLocaleString('es-ES')+' kg vol.':''}</span>
        </div>
        ${exNames.slice(0,5).map((name,i)=>{
          const exSets=sets.filter(ws=>ws.exercise_name===name);
          const setsStr=exSets.map(ws=>`${ws.reps_done||'?'}×${ws.weight_kg||'?'}kg`).join(', ');
          return `<div class="workout-row">
            <div class="ex-num">${i+1}</div>
            <div class="ex-name">${name}</div>
            <div class="ex-sets" style="font-size:10px;color:var(--text3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${setsStr}</div>
          </div>`;
        }).join('')}
        ${exNames.length>5?`<div style="font-size:11px;color:var(--text3);padding:6px 0">+${exNames.length-5} ejercicios más</div>`:''}
      </div>`;
    }).join('')}
    ${allSess.filter(s=>s.completed).length===0?`<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-title">Sin sesiones registradas</div><div class="empty-sub">${c.name.split(' ')[0]} no ha registrado ninguna sesión todavía.</div></div>`:''}
  </div>`;
}

function getDayDateFromWeekStart(dayIdx){
  const d=new Date();const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1)+dayIdx;
  return new Date(new Date().setDate(diff)).toISOString().slice(0,10);
}

let exRowCounters={};
function addExerciseRow(dayIdx){
  const list=document.getElementById('exlist-'+dayIdx);
  if(!list)return;
  if(!exRowCounters[dayIdx])exRowCounters[dayIdx]=0;
  const idx=exRowCounters[dayIdx]++;
  const row=document.createElement('div');
  row.id=`exrow-${dayIdx}-${idx}`;
  row.style.cssText='display:grid;grid-template-columns:2fr 60px 80px 70px 24px;gap:5px;margin-bottom:5px;align-items:center';
  row.innerHTML=`
    <input type="text" placeholder="Nombre del ejercicio" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);outline:none;background:var(--bg2);color:var(--text)">

    <input type="text" placeholder="8-12" style="padding:6px 4px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);outline:none;background:var(--bg2);color:var(--text);text-align:center">
    <input type="text" placeholder="2 min" style="padding:6px 4px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);outline:none;background:var(--bg2);color:var(--text);text-align:center">
    <button onclick="document.getElementById('exrow-${dayIdx}-${idx}').remove()" style="width:22px;height:22px;border-radius:5px;background:var(--rl);border:none;cursor:pointer;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center">✕</button>`;
  list.insertBefore(row, list.querySelector('button'));
}

async function savePlan(clientId){
  const days=Array.from({length:7},(_,i)=>document.getElementById('split-'+i)?.value||'DESCANSO');
  
  // Collect exercises
  const exercises=[];
  days.forEach((sess,dayIdx)=>{
    if(sess==='DESCANSO')return;
    const list=document.getElementById('exlist-'+dayIdx);
    if(!list)return;
    const rows=list.querySelectorAll('[id^="exrow-"]');
    rows.forEach((row,orderIdx)=>{
      const inputs=row.querySelectorAll('input');
      const name=inputs[0]?.value?.trim();
      if(!name)return;
      exercises.push({
        day_number:dayIdx+1,
        session_type:sess,
        exercise_name:name,
        sets:parseInt(inputs[1]?.value)||3,
        reps:inputs[2]?.value||'8-12',
        rest:inputs[3]?.value||'2 min',
        order_index:orderIdx
      });
    });
  });

  if(!exercises.length){showToast('Añade al menos un ejercicio','red');return;}

  const btn=document.querySelector('#plan-modal button[onclick^="savePlan"]');
  if(btn){btn.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></span> Guardando…';btn.disabled=true;}

  // Deactivate existing plans
  await sb.from('training_plans').update({is_active:false}).eq('client_id',clientId);

  // Create new plan
  const {data:plan,error}=await sb.from('training_plans').insert({
    client_id:clientId,
    coach_id:coachData.id,
    split:days,
    split_days:7,
    is_active:true,
    published_at:new Date().toISOString()
  }).select().single();

  if(error){console.error(error);showToast('Error al guardar el plan','red');return;}

  // Insert exercises
  const exWithPlanId=exercises.map(e=>({...e,training_plan_id:plan.id}));
  const {error:exErr}=await sb.from('plan_exercises').insert(exWithPlanId);
  if(exErr){console.error(exErr);showToast('Error al guardar ejercicios','red');return;}

  document.getElementById('plan-modal')?.remove();
  showToast('✓ Plan guardado y activado','green');
  exRowCounters={};
  loadClientView();
}

  selectedTab=tab;
  loadClientView();
}

        <div class="ch-meta"><span class="meta-chip">${allClients.length} clientes activos · Semana actual</span></div>
      </div>
    </div>
    <div style="height:1px;background:var(--border);margin-top:14px"></div>
  </div>
  <div class="content">
    <div class="overview-grid">
      <div class="ov-stat">
        <div class="ov-stat-label">Sesiones esta semana</div>
        <div class="ov-stat-val">${totalSessions}</div>
        <div class="ov-stat-sub">entre todos los clientes</div>
      </div>
      <div class="ov-stat">
        <div class="ov-stat-label">Cheats esta semana</div>
        <div class="ov-stat-val" style="color:${totalCheats>5?'var(--red)':totalCheats>2?'var(--amber)':'var(--green)'}">${totalCheats}</div>
        <div class="ov-stat-sub">registros totales</div>
      </div>
      <div class="ov-stat">
        <div class="ov-stat-label">Clientes activos</div>
        <div class="ov-stat-val">${allClients.length}</div>
        <div class="ov-stat-sub">en seguimiento</div>
      </div>
    </div>
    <div class="section-title">Clientes</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${allClients.map(c=>{
        const cSessions=sessionsData.filter(s=>s.client_id===c.id&&s.completed).length;
        const cMetric=metricsData.find(m=>m.client_id===c.id);
        const cCheats=cheatsData.filter(ch=>ch.client_id===c.id).length;
        return `<div class="client-overview-card" onclick="selectClient('${c.id}')">
          <div class="ov-av" style="background:#f0fdf4;color:var(--green)">${initials(c.name)}</div>
          <div>
            <div class="ov-name">${c.name}</div>
            <div class="ov-meta">${c.goal||'sin objetivo'} · ${c.email}</div>
          </div>
          <div class="ov-stats">
            <div style="display:flex;gap:12px;align-items:center">
              <div style="text-align:center">
                <div class="ov-stat-num" style="color:${cSessions>=3?'var(--green)':cSessions>=1?'var(--amber)':'var(--red)'}">${cSessions}/5</div>
                <div class="ov-stat-lbl">gym</div>
              </div>
              <div style="text-align:center">
                <div class="ov-stat-num" style="color:${cCheats===0?'var(--green)':cCheats<=2?'var(--amber)':'var(--red)'}">${cCheats}</div>
                <div class="ov-stat-lbl">cheats</div>
              </div>
              ${cMetric?.weight_kg?`<div style="text-align:center"><div class="ov-stat-num">${cMetric.weight_kg}kg</div><div class="ov-stat-lbl">peso</div></div>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  main.innerHTML=overviewHtml;
}


// ── REQUESTS ──
async function showRequests(){
  selectedClient=null;
  renderClientList(allClients);
  document.getElementById('btn-overview').classList.remove('active');
  const main=document.getElementById('main-area');
  main.innerHTML='<div class="empty-state"><div class="loading-dot" style="width:8px;height:8px"></div></div>';

  const {data:requests}=await sb.from('pending_requests')
    .select('*').eq('coach_id',coachData.id).eq('status','pending').order('created_at',{ascending:false});
  const reqs=requests||[];

  // Update badge
  const badge=document.getElementById('requests-badge');
  if(reqs.length>0){badge.textContent=reqs.length;badge.classList.remove('hidden');}
  else{badge.classList.add('hidden');}

  const headerHtml=`<div class="client-header">
    <div class="ch-top">
      <div class="ch-info">
        <div class="ch-name" style="font-family:var(--serif);font-size:24px">Solicitudes nuevas</div>
        <div class="ch-meta"><span class="meta-chip">${reqs.length} pendiente${reqs.length!==1?'s':''} de aprobación</span></div>
      </div>
    </div>
    <div style="height:1px;background:var(--border);margin-top:14px"></div>
  </div>`;

  if(!reqs.length){
    main.innerHTML=headerHtml+`<div class="content"><div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Sin solicitudes pendientes</div><div class="empty-sub">Cuando un nuevo cliente se registre con tu código, aparecerá aquí.</div></div></div>`;
    return;
  }

  const reqsHtml=reqs.map(r=>{
    const q=r.questionnaire||{};
    const qItems=[
      {l:'Objetivo',v:r.goal},
      {l:'Alergias/intolerancias',v:q.q_allergies},
      {l:'Enfermedades',v:q.q_diseases},
      {l:'Alimentos',v:q.q_disliked},
      {l:'Comidas al día',v:q.q_meals},
      {l:'Frutas y verduras',v:q.q_fruits},
      {l:'Suplementación',v:q.q_supplements},
      {l:'Apps de nutrición',v:q.q_apps},
      {l:'Entrenamiento previo',v:q.q_training},
      {l:'Sueño',v:q.q_sleep},
      {l:'Primera vez con entrenador',v:q.q_first_coach},
      {l:'Split preferido',v:q.split},
    ].filter(i=>i.v);

    return `<div class="req-card">
      <div class="req-header">
        <div>
          <div class="req-name">${r.name}</div>
          <div class="req-email">${r.email}</div>
        </div>
        <div class="req-badge">Pendiente</div>
      </div>
      <div class="req-data-grid">
        ${r.height_cm?`<div class="req-data-item"><div class="req-data-label">Altura</div><div class="req-data-val">${r.height_cm} cm</div></div>`:''}
        ${r.weight_kg?`<div class="req-data-item"><div class="req-data-label">Peso</div><div class="req-data-val">${r.weight_kg} kg</div></div>`:''}
        ${q.birth?`<div class="req-data-item"><div class="req-data-label">Nacimiento</div><div class="req-data-val">${q.birth}</div></div>`:''}
      </div>
      <div class="req-details-toggle" onclick="toggleReqDetails('${r.id}')">
        <span id="toggle-${r.id}">▼</span> Ver cuestionario completo
      </div>
      <div id="req-details-${r.id}" style="display:none;margin-bottom:12px">
        ${qItems.map(i=>`<div class="req-q">
          <div class="req-q-label">${i.l}</div>
          <div class="req-q-val">${i.v}</div>
        </div>`).join('')}
      </div>
      <div class="req-actions">
        <button class="req-btn reject" onclick="rejectRequest('${r.id}')">✕ Rechazar</button>
        <button class="req-btn accept" onclick="acceptRequest('${r.id}','${r.name}','${r.email}',${r.height_cm||null},${r.weight_kg||null},'${r.goal||''}','${r.user_id}')">✓ Aceptar cliente</button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML=headerHtml+`<div class="content">${reqsHtml}</div>`;
}

function toggleReqDetails(id){
  const el=document.getElementById('req-details-'+id);
  const toggle=document.getElementById('toggle-'+id);
  if(el.style.display==='none'){el.style.display='block';toggle.textContent='▲';}
  else{el.style.display='none';toggle.textContent='▼';}
}

async function acceptRequest(reqId, name, email, height, weight, goal, userId){
  if(!confirm('¿Aceptar a '+name+' como cliente?'))return;
  
  // Create client record
  const {data:client,error:clientErr}=await sb.from('clients').insert({
    user_id:userId,
    coach_id:coachData.id,
    name:name,
    email:email,
    height_cm:height||null,
    weight_kg:weight||null,
    goal:goal||null,
    status:'active',
    member_since:new Date().toISOString().slice(0,10),
    revision_every_weeks:2
  }).select().single();

  if(clientErr){console.error(clientErr);showToast('Error al crear cliente','red');return;}

  // Update request status
  await sb.from('pending_requests').update({status:'accepted'}).eq('id',reqId);

  // Reload
  allClients.push(client);
  allClients.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('client-count').textContent=allClients.length;
  renderClientList(allClients);
  showToast('✓ '+name+' añadido como cliente','green');
  showRequests();
}

async function rejectRequest(reqId){
  if(!confirm('¿Rechazar esta solicitud?'))return;
  await sb.from('pending_requests').update({status:'rejected'}).eq('id',reqId);
  showToast('Solicitud rechazada');
  showRequests();
}

// ── BOOT ──
async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session){
      await initApp(session.user);
    } else {
      document.getElementById('screen-loading').classList.add('hidden');
      document.getElementById('screen-auth').classList.remove('hidden');
    }
  }catch(e){
    console.error(e);
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-auth').classList.remove('hidden');
  }
}

sb.auth.onAuthStateChange((event)=>{
  if(event==='SIGNED_OUT'){
    document.getElementById('screen-app').classList.add('hidden');
    document.getElementById('screen-auth').classList.remove('hidden');
  }
});

boot();
</script>
